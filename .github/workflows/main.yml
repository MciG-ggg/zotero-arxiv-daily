name: Send emails daily
on:
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * *'

jobs:
  calculate-and-send:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          repository: ${{ vars.REPOSITORY }}
          ref: ${{ vars.REF }}
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Run script
        env:
          ZOTERO_ID: ${{ secrets.ZOTERO_ID }}
          ZOTERO_KEY: ${{ secrets.ZOTERO_KEY }}
          SENDER: ${{ secrets.SENDER }}
          RECEIVER: ${{ secrets.RECEIVER }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
          OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
          OPENALEX_MAILTO: ${{ vars.OPENALEX_MAILTO }}
          CLASSICS_ENABLED: true
          CLASSIC_HISTORY_WRITEBACK: true
          CUSTOM_CONFIG: ${{ vars.CUSTOM_CONFIG }}
        run: |
          printf "%b\n" "$CUSTOM_CONFIG" > config/custom.yaml
          echo "Use custom config: "
          cat config/custom.yaml
          uv run src/zotero_arxiv_daily/main.py

      - name: Commit classic history if changed
        run: |
          git restore --worktree config/custom.yaml
          TARGET_REF="${{ vars.REF }}"
          if [ -z "$TARGET_REF" ]; then
            TARGET_REF="${GITHUB_REF_NAME}"
          fi
          COMMIT_MESSAGE_FILE="$(mktemp)"
          cat <<'EOF' > "$COMMIT_MESSAGE_FILE"
Persist sent classic-paper history

Constraint: GitHub Actions runs are ephemeral, so classic dedup history must live in the repository
Rejected: Keep history only in workflow workspace | history would be lost between runs
Confidence: high
Scope-risk: narrow
Directive: Only the production workflow should write classic history; keep test workflow read-only by default
Tested: Daily workflow history add-on path
Not-tested: Concurrent workflow runs updating history at the same time
EOF
          committed=0
          for attempt in 1 2 3; do
            git fetch origin "$TARGET_REF"
            REMOTE_HISTORY_FILE="$(mktemp)"
            if git show "origin/${TARGET_REF}:data/classic_recommendation_history.json" > "$REMOTE_HISTORY_FILE" 2>/dev/null; then
              python3 - "$REMOTE_HISTORY_FILE" data/classic_recommendation_history.json <<'PY'
import json
import sys
from pathlib import Path

remote_path = Path(sys.argv[1])
local_path = Path(sys.argv[2])


def load(path: Path) -> dict:
    if not path.exists():
        return {"version": 1, "recommended": []}
    try:
        payload = json.loads(path.read_text(encoding="utf-8"))
    except json.JSONDecodeError:
        return {"version": 1, "recommended": []}
    if not isinstance(payload, dict):
        return {"version": 1, "recommended": []}
    entries = payload.get("recommended", [])
    if not isinstance(entries, list):
        entries = []
    normalized = []
    for entry in entries:
        if isinstance(entry, dict) and isinstance(entry.get("id"), str):
            normalized.append(entry)
    return {"version": int(payload.get("version", 1) or 1), "recommended": normalized}


remote = load(remote_path)
local = load(local_path)
merged = {}
for entry in remote["recommended"] + local["recommended"]:
    merged[entry["id"]] = entry

payload = {
    "version": 1,
    "recommended": [merged[key] for key in sorted(merged)],
}
local_path.write_text(json.dumps(payload, indent=2, ensure_ascii=False) + "\n", encoding="utf-8")
PY
            fi
            rm -f "$REMOTE_HISTORY_FILE"
            git add data/classic_recommendation_history.json
            if git diff --staged --quiet; then
              echo "No classic history changes to commit"
              exit 0
            fi
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            if [ "$committed" -eq 0 ]; then
              git commit -F "$COMMIT_MESSAGE_FILE"
              committed=1
            else
              git commit --amend --no-edit
            fi
            if git push origin "HEAD:${TARGET_REF}"; then
              exit 0
            fi
            echo "Push rejected; retrying classic-history writeback ($attempt/3)..."
            sleep $((attempt * 5))
          done
          echo "Failed to push classic history after retries"
          exit 1
